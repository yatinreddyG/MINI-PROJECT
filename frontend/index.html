<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEW MINI — AI Disease Prediction</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- React + ReactDOM + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="src/styles/global.css" />
  <link rel="stylesheet" href="src/styles/dashboard.css" />
  <link rel="stylesheet" href="src/styles/form.css" />
  <link rel="stylesheet" href="src/styles/results.css" />
</head>
<body>

  <!-- Loading screen — shows while Babel compiles -->
  <div id="root">
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0a0c12;
      flex-direction:column;
      gap:20px;
    ">
      <div style="font-size:56px;animation:none">🩺</div>
      <div style="
        color:#64c8b4;
        font-size:18px;
        font-family:sans-serif;
        font-weight:500;
        letter-spacing:1px;
      ">MedPredict</div>
      <div style="
        color:#374151;
        font-size:13px;
        font-family:sans-serif;
      ">Loading AI models...</div>
      <div style="
        width:160px;
        height:3px;
        background:#1a1f2e;
        border-radius:99px;
        overflow:hidden;
      ">
        <div style="
          height:100%;
          background:linear-gradient(90deg,#2dd4bf,#f97316);
          border-radius:99px;
          animation:loading-bar 1.5s ease-in-out infinite;
        "></div>
      </div>
    </div>
  </div>

  <style>
    @keyframes loading-bar {
      0%   { width:0%;   margin-left:0; }
      50%  { width:80%;  margin-left:0; }
      100% { width:0%;   margin-left:100%; }
    }
  </style>

  <!-- Single bundled file — much faster than 16 separate files -->
  <script type="text/babel" src="src/bundle.jsx"></script>

</body>
</html>
